<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="旅迹登录页——登录后继续规划你的下一段旅程。">
  <meta name="theme-color" content="#12304a">
  <title>登录｜旅迹</title>
  <style>
    :root {
      --navy: #12304a;
      --blue: #286b91;
      --sky: #b9d9e8;
      --mist: #f2f6f5;
      --orange: #f28b4b;
      --ink: #17232b;
      --muted: #65737c;
      --line: #d6e0e2;
      --white: #ffffff;
    }

    * { box-sizing: border-box; }

    html, body { min-height: 100%; }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--mist);
      font-family: "Avenir Next", "PingFang SC", "Microsoft YaHei", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    button, input { font: inherit; }

    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(390px, .85fr);
    }

    .journey {
      position: relative;
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: clamp(28px, 5vw, 72px);
      color: var(--white);
      background:
        radial-gradient(circle at 78% 16%, rgba(185,217,232,.42), transparent 28%),
        linear-gradient(145deg, #173d59 0%, #12304a 56%, #0c2639 100%);
    }

    .brand {
      position: relative;
      z-index: 2;
      display: inline-flex;
      width: fit-content;
      align-items: center;
      gap: 12px;
      color: inherit;
      text-decoration: none;
      font-weight: 700;
      letter-spacing: .12em;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      border: 1px solid rgba(255,255,255,.55);
      border-radius: 50%;
      display: grid;
      place-items: center;
    }

    .brand-mark::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--orange);
      box-shadow: 9px -6px 0 -2px var(--sky);
    }

    .intro {
      position: relative;
      z-index: 2;
      max-width: 690px;
      padding: 10vh 0 8vh;
    }

    .eyebrow {
      margin: 0 0 22px;
      font: 600 12px/1.2 ui-monospace, "SFMono-Regular", Consolas, monospace;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--sky);
    }

    h1 {
      max-width: 650px;
      margin: 0;
      font-family: "STSong", "Songti SC", Georgia, serif;
      font-size: clamp(48px, 7vw, 104px);
      font-weight: 400;
      line-height: .98;
      letter-spacing: -.045em;
    }

    .intro p:last-child {
      max-width: 450px;
      margin: 28px 0 0;
      color: rgba(255,255,255,.72);
      font-size: clamp(15px, 1.3vw, 18px);
      line-height: 1.8;
    }

    .route {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      opacity: .85;
    }

    .route path {
      fill: none;
      stroke: rgba(185,217,232,.55);
      stroke-width: 1.25;
      stroke-dasharray: 6 11;
      animation: drift 16s linear infinite;
    }

    .route circle { fill: var(--orange); }

    .place-list {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: space-between;
      gap: 24px;
      padding-top: 18px;
      border-top: 1px solid rgba(255,255,255,.18);
      color: rgba(255,255,255,.62);
      font: 500 11px/1.4 ui-monospace, "SFMono-Regular", Consolas, monospace;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .login-panel {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: clamp(30px, 7vw, 96px);
      background:
        linear-gradient(rgba(18,48,74,.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(18,48,74,.035) 1px, transparent 1px),
        var(--mist);
      background-size: 32px 32px;
    }

    .login-card { width: min(100%, 440px); }

    .login-card h2 {
      margin: 0 0 10px;
      color: var(--navy);
      font-family: "STSong", "Songti SC", Georgia, serif;
      font-size: clamp(34px, 4vw, 52px);
      font-weight: 500;
      letter-spacing: -.03em;
    }

    .lead {
      margin: 0 0 38px;
      color: var(--muted);
      line-height: 1.6;
    }

    .field { margin-bottom: 22px; }

    label {
      display: block;
      margin-bottom: 9px;
      color: var(--navy);
      font-size: 13px;
      font-weight: 700;
    }

    .input-wrap { position: relative; }

    input[type="email"], input[type="password"], input[type="text"] {
      width: 100%;
      height: 54px;
      border: 1px solid var(--line);
      border-radius: 8px;
      outline: none;
      background: rgba(255,255,255,.78);
      padding: 0 48px 0 16px;
      color: var(--ink);
      transition: border-color .2s, box-shadow .2s, background .2s;
    }

    input::placeholder { color: #9aa5aa; }

    input:focus {
      border-color: var(--blue);
      background: var(--white);
      box-shadow: 0 0 0 4px rgba(40,107,145,.12);
    }

    .toggle-password {
      position: absolute;
      top: 50%;
      right: 10px;
      transform: translateY(-50%);
      border: 0;
      border-radius: 5px;
      padding: 7px;
      color: var(--blue);
      background: transparent;
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
    }

    .options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      margin: 4px 0 26px;
      font-size: 13px;
    }

    .remember { display: flex; align-items: center; gap: 8px; color: var(--muted); }
    .remember input { accent-color: var(--blue); }
    a { color: var(--blue); text-underline-offset: 3px; }

    .login-button {
      width: 100%;
      height: 56px;
      border: 0;
      border-radius: 8px;
      color: var(--white);
      background: var(--navy);
      cursor: pointer;
      font-weight: 700;
      letter-spacing: .06em;
      box-shadow: 0 12px 24px rgba(18,48,74,.18);
      transition: transform .2s, background .2s, box-shadow .2s;
    }

    .login-button:hover { transform: translateY(-2px); background: var(--blue); box-shadow: 0 16px 30px rgba(18,48,74,.22); }
    .login-button:active { transform: translateY(0); }
    button:focus-visible, a:focus-visible { outline: 3px solid rgba(242,139,75,.55); outline-offset: 3px; }

    .status {
      min-height: 24px;
      margin: 16px 0 0;
      color: var(--blue);
      font-size: 13px;
      line-height: 1.5;
    }

    .signup {
      margin: 30px 0 0;
      padding-top: 25px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 14px;
      text-align: center;
    }

    @keyframes drift { to { stroke-dashoffset: -170; } }

    @media (max-width: 820px) {
      .shell { grid-template-columns: 1fr; }
      .journey { min-height: 43vh; padding: 28px; }
      .intro { padding: 8vh 0 5vh; }
      .intro p:last-child { display: none; }
      .place-list { display: none; }
      .login-panel { min-height: 57vh; padding: 44px 24px 56px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { scroll-behavior: auto !important; animation-duration: .01ms !important; animation-iteration-count: 1 !important; transition-duration: .01ms !important; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="journey" aria-labelledby="journey-title">
      <a class="brand" href="#" aria-label="旅迹首页">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>旅迹</span>
      </a>

      <svg class="route" viewBox="0 0 900 900" preserveAspectRatio="none" aria-hidden="true">
        <path d="M-40 730 C130 610, 230 820, 390 650 S610 370, 950 210" />
        <circle cx="391" cy="649" r="5" />
        <circle cx="738" cy="322" r="5" />
      </svg>

      <div class="intro">
        <p class="eyebrow">Your next chapter awaits</p>
        <h1 id="journey-title">下一站，<br>从这里出发。</h1>
        <p>收藏灵感、安排路线、记录沿途的每一个瞬间。你的旅程，始终在同一个地方。</p>
      </div>

      <div class="place-list" aria-hidden="true">
        <span>31.2304° N<br>Shanghai</span>
        <span>35.6762° N<br>Tokyo</span>
        <span>48.8566° N<br>Paris</span>
      </div>
    </section>

    <section class="login-panel" aria-labelledby="login-title">
      <div class="login-card">
        <h2 id="login-title">欢迎回来</h2>
        <p class="lead">登录后，继续规划你的下一段旅程。</p>

        <form id="login-form">
          <div class="field">
            <label for="email">邮箱</label>
            <div class="input-wrap">
              <input id="email" name="email" type="email" autocomplete="email" placeholder="name@example.com" required>
            </div>
          </div>

          <div class="field">
            <label for="password">密码</label>
            <div class="input-wrap">
              <input id="password" name="password" type="password" autocomplete="current-password" placeholder="请输入密码" minlength="6" required>
              <button class="toggle-password" id="toggle-password" type="button" aria-label="显示密码">显示</button>
            </div>
          </div>

          <div class="options">
            <label class="remember"><input type="checkbox" name="remember"> 保持登录</label>
            <a href="#" id="forgot-link">忘记密码？</a>
          </div>

          <button class="login-button" type="submit">登录并继续</button>
          <p class="status" id="status" role="status" aria-live="polite"></p>
        </form>

        <p class="signup">第一次来到旅迹？ <a href="#" id="signup-link">创建账户</a></p>
      </div>
    </section>
  </main>

  <script>
    const password = document.querySelector('#password');
    const togglePassword = document.querySelector('#toggle-password');
    const form = document.querySelector('#login-form');
    const status = document.querySelector('#status');

    togglePassword.addEventListener('click', () => {
      const isHidden = password.type === 'password';
      password.type = isHidden ? 'text' : 'password';
      togglePassword.textContent = isHidden ? '隐藏' : '显示';
      togglePassword.setAttribute('aria-label', isHidden ? '隐藏密码' : '显示密码');
    });

    form.addEventListener('submit', (event) => {
      event.preventDefault();
      status.textContent = '演示登录成功。接入账号服务后即可跳转到你的行程。';
    });

    document.querySelector('#forgot-link').addEventListener('click', (event) => {
      event.preventDefault();
      status.textContent = '这是演示页面，暂未接入密码找回服务。';
    });

    document.querySelector('#signup-link').addEventListener('click', (event) => {
      event.preventDefault();
      status.textContent = '这是演示页面，暂未接入注册服务。';
    });
  </script>
</body>
</html>
